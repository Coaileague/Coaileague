name: Build Android APK/AAB

on:
  push:
    branches: ['main', 'release/**']
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  build-android:
    name: Build Android Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: ${{ env.JAVA_VERSION }}
        cache: 'gradle'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build web app
      run: npm run build
    
    - name: Sync Capacitor
      run: npx cap sync android
    
    - name: Decode Keystore
      if: ${{ secrets.KEYSTORE_BASE64 != '' }}
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/coaileague.keystore
        echo "Keystore created at android/app/coaileague.keystore"
    
    - name: Build Debug APK (unsigned)
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: Verify Keystore Exists
      if: ${{ secrets.KEYSTORE_BASE64 != '' }}
      run: |
        if [ ! -f "android/app/coaileague.keystore" ]; then
          echo "ERROR: Keystore file not found!"
          exit 1
        fi
        echo "Keystore verified at android/app/coaileague.keystore"
    
    - name: Build Release AAB (signed)
      if: ${{ secrets.KEYSTORE_BASE64 != '' }}
      env:
        KEYSTORE_FILE: app/coaileague.keystore
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        cd android
        ./gradlew bundleRelease
        if [ ! -f "app/build/outputs/bundle/release/app-release.aab" ]; then
          echo "ERROR: Release AAB not created!"
          exit 1
        fi
    
    - name: Build Release APK (signed)
      if: ${{ secrets.KEYSTORE_BASE64 != '' }}
      env:
        KEYSTORE_FILE: app/coaileague.keystore
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        cd android
        ./gradlew assembleRelease
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: coaileague-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
    
    - name: Upload Release AAB
      if: ${{ secrets.KEYSTORE_BASE64 != '' }}
      uses: actions/upload-artifact@v4
      with:
        name: coaileague-release-aab
        path: android/app/build/outputs/bundle/release/*.aab
        retention-days: 90
    
    - name: Upload Release APK
      if: ${{ secrets.KEYSTORE_BASE64 != '' }}
      uses: actions/upload-artifact@v4
      with:
        name: coaileague-release-apk
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 90
