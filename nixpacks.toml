[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[variables]
NPM_CONFIG_PRODUCTION = "false"
# Increase Node.js heap for the build — 1.1M lines of TS requires 4GB
NODE_OPTIONS = "--max-old-space-size=4096"

[start]
cmd = "npm run start"
