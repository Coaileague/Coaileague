<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyanGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#22d3ee;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:0.3" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Trinity Triquetra - Three interlocking loops -->
  
  <!-- Loop 1 - Top (Teal) -->
  <path 
    d="M 50 15 
       C 65 15, 75 30, 75 45
       C 75 55, 65 65, 50 50
       C 35 65, 25 55, 25 45
       C 25 30, 35 15, 50 15 Z"
    fill="none"
    stroke="url(#tealGradient)"
    stroke-width="6"
    stroke-linecap="round"
    filter="url(#glow)"
  />
  
  <!-- Loop 2 - Bottom Left (Cyan) -->
  <path 
    d="M 25 75 
       C 15 65, 15 50, 25 40
       C 32 32, 45 35, 50 50
       C 45 60, 35 70, 25 75
       C 30 85, 45 85, 50 75 Z"
    fill="none"
    stroke="url(#cyanGradient)"
    stroke-width="6"
    stroke-linecap="round"
    filter="url(#glow)"
  />
  
  <!-- Loop 3 - Bottom Right (Blue) -->
  <path 
    d="M 75 75 
       C 85 65, 85 50, 75 40
       C 68 32, 55 35, 50 50
       C 55 60, 65 70, 75 75
       C 70 85, 55 85, 50 75 Z"
    fill="none"
    stroke="url(#blueGradient)"
    stroke-width="6"
    stroke-linecap="round"
    filter="url(#glow)"
  />
  
  <!-- Central nexus point -->
  <circle cx="50" cy="50" r="8" fill="url(#coreGlow)" filter="url(#glow)"/>
  <circle cx="50" cy="50" r="4" fill="#ffffff" opacity="0.95"/>
</svg>
