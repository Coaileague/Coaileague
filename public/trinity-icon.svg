<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#22d3ee;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:0.4" />
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Five-pointed interwoven ribbon knot - Trinity Symbol -->
  <!-- Brand-compliant teal/cyan gradient palette -->
  <path d="M 100 100 Q 100 55 100 35 Q 105 55 100 100" fill="url(#tealGradient)" filter="url(#glow)" opacity="0.95"/>
  <path d="M 100 35 Q 95 55 100 100 Q 100 55 100 35" fill="url(#tealGradient)" opacity="0.9"/>
  <path d="M 100 100 Q 130 75 155 55 Q 130 80 100 100" fill="url(#cyanGradient)" filter="url(#glow)" opacity="0.95"/>
  <path d="M 155 55 Q 125 80 100 100 Q 130 75 155 55" fill="url(#cyanGradient)" opacity="0.9"/>
  <path d="M 100 100 Q 140 115 160 145 Q 135 120 100 100" fill="url(#tealGradient)" filter="url(#glow)" opacity="0.95"/>
  <path d="M 160 145 Q 130 115 100 100 Q 140 115 160 145" fill="url(#tealGradient)" opacity="0.9"/>
  <path d="M 100 100 Q 60 115 40 145 Q 65 120 100 100" fill="url(#cyanGradient)" filter="url(#glow)" opacity="0.95"/>
  <path d="M 40 145 Q 70 115 100 100 Q 60 115 40 145" fill="url(#cyanGradient)" opacity="0.9"/>
  <path d="M 100 100 Q 70 75 45 55 Q 70 80 100 100" fill="url(#tealGradient)" filter="url(#glow)" opacity="0.95"/>
  <path d="M 45 55 Q 75 80 100 100 Q 70 75 45 55" fill="url(#tealGradient)" opacity="0.9"/>
  <circle cx="100" cy="100" r="18" fill="url(#coreGlow)" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="12" fill="#ffffff" opacity="0.9"/>
  <circle cx="100" cy="100" r="6" fill="#22d3ee"/>
</svg>
