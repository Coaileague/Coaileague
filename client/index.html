<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AutoForce™" />
    <title>AutoForce™ - Autonomous Workforce Management Solutions</title>
    <meta name="description" content="Autonomous workforce management platform for emergency services with intelligent automation, real-time tracking, and compliance tools. Streamline operations with BillOS™, PayrollOS™, CommOS™, and more." />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AutoForce™ - Autonomous Workforce Management Solutions" />
    <meta property="og:description" content="Streamline emergency services operations with autonomous workforce management, intelligent automation, and real-time tracking" />
    <meta property="og:image" content="/og-image.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Theme Color - Blue -->
    <meta name="theme-color" content="#3b82f6" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" content="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/print-styles.css" media="print">
    <style>
      /* Minimal static fallback loader - hands off to React immediately */
      #initial-loader {
        position: fixed;
        inset: 0;
        z-index: 99998; /* Lower than React overlay (99999) */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      }
      
      #initial-loader.loaded {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease-out;
      }
      
      .loader-logo {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      
      .loader-logo-icon {
        width: clamp(32px, 10vw, 48px);
        height: clamp(32px, 10vw, 48px);
        border-radius: 10px;
        background: linear-gradient(135deg, #3b82f6 0%, #22d3ee 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: clamp(14px, 4vw, 20px);
        color: white;
      }
      
      .loader-logo h1 {
        font-size: clamp(20px, 6vw, 28px);
        font-weight: 700;
        background: linear-gradient(135deg, #3b82f6 0%, #22d3ee 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin: 0;
      }
      
      /* Simple spinner */
      .loader-spinner {
        width: 40px;
        height: 40px;
        margin-top: 24px;
        border: 4px solid rgba(59, 130, 246, 0.2);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Minimal static fallback - React overlay takes over immediately -->
    <div id="initial-loader">
      <div class="loader-logo">
        <div class="loader-logo-icon">AF</div>
        <h1>AutoForce™</h1>
      </div>
      <div class="loader-spinner"></div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Quick handoff to React overlay -->
    <script>
      (function() {
        // Fade out static loader as soon as React mounts
        window.addEventListener('load', function() {
          var loader = document.getElementById('initial-loader');
          if (loader) {
            loader.classList.add('loaded');
            setTimeout(function() {
              loader.remove();
            }, 200);
          }
        });
      })();
    </script>
  </body>
</html>
