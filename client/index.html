<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AutoForce™" />
    <title>AutoForce™ - Autonomous Workforce Management Solutions</title>
    <meta name="description" content="Autonomous workforce management platform for emergency services with intelligent automation, real-time tracking, and compliance tools. Streamline operations with BillOS™, PayrollOS™, CommOS™, and more." />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AutoForce™ - Autonomous Workforce Management Solutions" />
    <meta property="og:description" content="Streamline emergency services operations with autonomous workforce management, intelligent automation, and real-time tracking" />
    <meta property="og:image" content="/og-image.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Theme Color - Blue -->
    <meta name="theme-color" content="#3b82f6" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" content="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/print-styles.css" media="print">
  </head>
  <body>
    <div id="root">
      <!-- Pre-React Loading Screen - Shows instantly while JavaScript loads -->
      <style>
        #initial-loader {
          position: fixed;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #0f172a;
          z-index: 9999;
        }
        #initial-loader-content {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 1.5rem;
        }
        #initial-loader-logo {
          display: flex;
          align-items: baseline;
          gap: 0.25rem;
          margin-bottom: 0.5rem;
        }
        #initial-loader-wordmark {
          font-size: 2rem;
          font-weight: 900;
          background: linear-gradient(to right, #3b82f6, #3b82f6, #06b6d4);
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
        }
        #initial-loader-tm {
          font-size: 0.625rem;
          font-weight: 900;
          color: #3b82f6;
          vertical-align: super;
        }
        #initial-loader-spinner {
          width: 3rem;
          height: 3rem;
          border: 4px solid rgba(59, 130, 246, 0.2);
          border-top-color: #3b82f6;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        }
        #initial-loader-text {
          font-size: 0.875rem;
          color: #94a3b8;
          animation: pulse 2s ease-in-out infinite;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.5; }
        }
        @media (prefers-color-scheme: light) {
          #initial-loader {
            background: #ffffff;
          }
          #initial-loader-text {
            color: #64748b;
          }
        }
      </style>
      <div id="initial-loader">
        <div id="initial-loader-content">
          <div id="initial-loader-logo">
            <span id="initial-loader-wordmark">AutoForce</span>
            <span id="initial-loader-tm">™</span>
          </div>
          <div id="initial-loader-spinner"></div>
          <p id="initial-loader-text">Loading workspace...</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
