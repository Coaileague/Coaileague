<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CoAIleague" />
    <title>CoAIleague - Autonomous Workforce Management Solutions</title>
    <meta name="description" content="Autonomous workforce management platform for emergency services with intelligent automation, real-time tracking, and compliance tools. Streamline operations with BillOS™, PayrollOS™, CommOS™, and more." />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CoAIleague - Autonomous Workforce Management Solutions" />
    <meta property="og:description" content="Streamline emergency services operations with autonomous workforce management, intelligent automation, and real-time tracking" />
    <meta property="og:image" content="/og-image.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Theme Color - Blue -->
    <meta name="theme-color" content="#3b82f6" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" content="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/print-styles.css" media="print">
  </head>
  <body>
    <style>
      /* AGGRESSIVE: Block ALL loading screens and overlays */
      #initial-loader { display: none !important; visibility: hidden !important; opacity: 0 !important; position: fixed !important; z-index: -9999 !important; }
      [id*="loader"] { display: none !important; visibility: hidden !important; opacity: 0 !important; }
      [class*="loader"] { display: none !important; visibility: hidden !important; opacity: 0 !important; }
      [class*="loading"] { display: none !important; visibility: hidden !important; opacity: 0 !important; }
    </style>
    <div id="root"></div>
    <script>
      // Suppress Vite HMR WebSocket errors BEFORE any modules load (development-only)
      
      // Patch WebSocket constructor to prevent "localhost:undefined" errors
      const OriginalWebSocket = globalThis.WebSocket;
      globalThis.WebSocket = function(url, ...args) {
        if (typeof url === 'string' && (url.includes('localhost:undefined') || url.includes('localhost:null'))) {
          // Return a mock WebSocket that silently fails
          const mockWs = {
            readyState: 3,
            close: () => {},
            send: () => {},
            addEventListener: () => {},
            removeEventListener: () => {},
            dispatchEvent: () => true
          };
          return mockWs;
        }
        return new OriginalWebSocket(url, ...args);
      };
      Object.setPrototypeOf(globalThis.WebSocket, OriginalWebSocket);
      
      // Catch any unhandledrejections from Vite HMR
      window.addEventListener('unhandledrejection', function(event) {
        const reason = event.reason;
        if (!reason) return;
        const reasonStr = String(reason);
        const messageStr = reason?.message ? String(reason.message) : "";
        
        if (reasonStr.includes("Failed to construct 'WebSocket'") || 
            reasonStr.includes("localhost:undefined") ||
            messageStr.includes("Failed to construct 'WebSocket'") ||
            messageStr.includes("localhost:undefined")) {
          event.preventDefault();
        }
      }, true); // Use capture phase to catch before any other handlers

      // Ensure no overlay blocks rendering
      window.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('[id*="loader"], [class*="loader"], [class*="loading"]').forEach(el => {
          el.style.display = 'none';
          el.style.visibility = 'hidden';
          el.style.opacity = '0';
          el.style.pointerEvents = 'none';
          el.style.zIndex = '-9999';
        });
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
