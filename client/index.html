    <!-- CRITICAL: Inject dark class synchronously BEFORE first paint to prevent FOUC.
         Reads stored theme + checks night hours (7pm-6am = dark) — same logic as ThemeProvider. -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('coaileague-theme');
          var isDark;
          if (stored === 'dark') {
            isDark = true;
          } else if (stored === 'light') {
            isDark = false;
          } else {
            var hour = new Date().getHours();
            isDark = (hour >= 19 || hour < 6);
          }
          if (isDark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.backgroundColor = '#0A1729';
          }
        } catch(e) {}
      })();
    </script>

    <!-- SCROLL PASSTHROUGH — NUCLEAR OPTION (scroll fix v4)          -->
    <!-- ============================================================ -->
    <!--
      Definitive fix for scroll being blocked by react-remove-scroll
      (used by Radix Dialog/Sheet/Popover, Vaul, etc).

      We monkey-patch EventTarget.prototype.addEventListener BEFORE any
      module bundle loads. Any subsequent registration of a `wheel` or
      `touchmove` listener — anywhere in the application or in any
      third-party library — is forced to be passive. The browser
      silently ignores preventDefault() calls inside passive listeners,
      so react-remove-scroll's shouldPrevent handler can call
      preventDefault() all it wants and the browser will still scroll.

      This is intentionally the nuclear option: it unblocks scroll
      definitively at the cost of disabling preventDefault() on
      wheel/touchmove anywhere in the app. The trade-off is acceptable
      because:
        - Native browser scroll is the primary user interaction
        - In-modal scroll lock is enforced by `overflow:hidden` on the
          modal backdrop and CSS `body.modal-open { overflow: hidden }`
        - No legitimate code path in the app needs to preventDefault on
          wheel/touchmove for production behavior
    -->
    <script>
      (function(){
        var _orig = EventTarget.prototype.addEventListener;
        EventTarget.prototype.addEventListener = function(type, fn, opts) {
          if (type === 'wheel' || type === 'touchmove') {
            var passive = (typeof opts === 'object' && opts !== null) ? Object.assign({}, opts) : {};
            passive.passive = true;
            return _orig.call(this, type, fn, passive);
          }
          return _orig.call(this, type, fn, opts);
        };
      })();
    </script>

    <script>
      // Theme bootstrap — runs before the HTML loader paints so the
      // pre-React splash matches the app's day/night mode on first paint.
      // Resolution order: localStorage 'coaileague-theme' → 'system' →
      // prefers-color-scheme. Writes the `dark` class to <html> so
      // Tailwind dark-mode selectors also apply to the HTML loader
      // element once the theme-aware stylesheet below kicks in.
      (function () {
        try {
          var saved = localStorage.getItem('coaileague-theme');
          var useDark;
          if (saved === 'dark') useDark = true;
          else if (saved === 'light') useDark = false;
          else useDark = !!(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (useDark) document.documentElement.classList.add('dark');
        } catch (e) {
          // localStorage blocked — fall through to CSS prefers-color-scheme
        }
      })();
    </script>
    <style>
      /* ── HTML Loader Shell (theme-aware) ──────────────────────────────
         Pre-React splash. Paints BEFORE the React ThemeProvider runs, so
         it can't use Tailwind theme tokens — instead we use CSS custom
         properties on the #html-loader element that flip based on:
           (1) the `dark` class set by the theme bootstrap inline script
           (2) the OS `prefers-color-scheme` media query as fallback
         All text/background colors reference these properties so the
         splash matches day/night seamlessly.
         The Trinity three-arrow SVG colors below are intentional brand
         colors (blue / orange / purple / white center) — NOT themed. */
      #html-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--hl-bg, #ffffff);
        color: var(--hl-text-primary, #1e293b);
        transition: opacity 0.4s ease;
        font-family: system-ui, -apple-system, sans-serif;
        overflow: hidden;
        --hl-bg: #ffffff;
        --hl-text-primary: #1e293b;
        --hl-text-muted: #64748b;
        --hl-text-faint: #94a3b8;
        --hl-bar-bg: rgba(0, 0, 0, 0.08);
        --hl-ring-border: rgba(30, 41, 59, 0.08);
      }
      html.dark #html-loader {
        --hl-bg: linear-gradient(135deg, #0a1628 0%, #0f2247 50%, #0a1628 100%);
        --hl-text-primary: #f1f5f9;
        --hl-text-muted: #94a3b8;
        --hl-text-faint: #64748b;
        --hl-bar-bg: rgba(255, 255, 255, 0.06);
        --hl-ring-border: rgba(148, 163, 184, 0.08);
      }
      @media (prefers-color-scheme: dark) {
        html:not(.light) #html-loader {
          --hl-bg: linear-gradient(135deg, #0a1628 0%, #0f2247 50%, #0a1628 100%);
          --hl-text-primary: #f1f5f9;
          --hl-text-muted: #94a3b8;
          --hl-text-faint: #64748b;
          --hl-bar-bg: rgba(255, 255, 255, 0.06);
          --hl-ring-border: rgba(148, 163, 184, 0.08);
        }
      }
      #html-loader.fade-out { opacity: 0; pointer-events: none; }
      #html-loader.gone { display: none; }

      /* ── Ambient glow rings ── */
      .hl-rings {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }
      .hl-ring {
        position: absolute;
        border-radius: 50%;
        animation: hl-ringPulse 3s ease-in-out infinite;
      }
      .hl-ring-1 { width: 320px; height: 320px; border: 1px solid var(--hl-ring-border); }
      .hl-ring-2 { width: 220px; height: 220px; border: 1px solid var(--hl-ring-border); animation-delay: 1s; }
      .hl-ring-3 { width: 150px; height: 150px; border: 1px solid var(--hl-ring-border); animation-delay: 2s; }

      /* ── Logo wrap ── */
      .hl-logo-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 20px;
      }
      .hl-logo-spin {
        width: 120px; height: 120px;
        animation: hl-orbit 6s linear infinite;
        margin-bottom: 10px;
      }
      .hl-arrow-blue   { animation: hl-pulseBlue   2s ease-in-out infinite; }
      .hl-arrow-orange { animation: hl-pulseOrange 2s ease-in-out infinite 0.66s; transform-origin: 60px 60px; transform: rotate(120deg); }
      .hl-arrow-purple { animation: hl-pulsePurple 2s ease-in-out infinite 1.33s; transform-origin: 60px 60px; transform: rotate(240deg); }
      .hl-orb { animation: hl-orbGlow 2s ease-in-out infinite; }

      /* ── Trinity label ── */
      .hl-trinity-label { text-align: center; animation: hl-fadeUp 0.5s ease both; }
      .hl-trinity-name {
        font-size: 22px; font-weight: 700; letter-spacing: 1px;
        background: linear-gradient(90deg, #60a5fa, #a78bfa, #fb923c);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .hl-trinity-sup { font-size: 10px; font-weight: 600; color: var(--hl-text-faint); vertical-align: super; }
      .hl-trinity-sub {
        display: block; font-size: 9px; color: var(--hl-text-muted);
        letter-spacing: 2px; text-transform: uppercase; margin-top: 1px;
      }

      /* ── Platform name letters ── */
      .hl-name {
        display: flex; align-items: flex-end; gap: 1px;
        margin-bottom: 4px;
      }
      .hl-letter {
        display: inline-block; font-size: 34px; font-weight: 800;
        letter-spacing: -0.5px; line-height: 1.1; transform-origin: 50% 80%;
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .hl-lc-blue   { background: linear-gradient(180deg,#60a5fa,#3b82f6); }
      .hl-lc-orange { background: linear-gradient(180deg,#f97316,#fb923c); }
      .hl-lc-purple { background: linear-gradient(180deg,#a78bfa,#8b5cf6); }
      .hl-lc-bpurp  { background: linear-gradient(180deg,#60a5fa,#a78bfa); }

      .hl-letter-C  { animation: hl-letterSlideLeft  2.4s ease-in-out infinite 0s; }
      .hl-letter-o  { animation: hl-letterFallTop    2.4s ease-in-out infinite 0.05s; }
      .hl-letter-A  { animation: hl-letterRotate     2.4s ease-in-out infinite 0.1s; }
      .hl-letter-I  { animation: hl-letterZoom       2.4s ease-in-out infinite 0.15s; }
      .hl-letter-l  { animation: hl-letterStretch    2.4s ease-in-out infinite 0.2s; }
      .hl-letter-e  { animation: hl-letterSpin       2.4s ease-in-out infinite 0.25s; }
      .hl-letter-a  { animation: hl-letterBounce     2.4s ease-in-out infinite 0.3s; }
      .hl-letter-g  { animation: hl-letterSwing      2.4s ease-in-out infinite 0.35s; }
      .hl-letter-u  { animation: hl-letterWobble     2.4s ease-in-out infinite 0.4s; }
      .hl-letter-e2 { animation: hl-letterSlideRight 2.4s ease-in-out infinite 0.45s; }
      .hl-reg { font-size: 11px; font-weight: 600; color: #60a5fa; -webkit-text-fill-color: #60a5fa; vertical-align: super; align-self: flex-start; padding-top: 4px; margin-left: 1px; }

      /* ── Subtitle ── */
      .hl-subtitle {
        color: var(--hl-text-muted); font-size: 10px; letter-spacing: 2.5px;
        text-transform: uppercase; margin-bottom: 24px; margin-top: 0;
        animation: hl-fadeUp 0.6s ease both 0.1s;
      }

      /* ── Status text ── */
      .hl-status {
        color: var(--hl-text-muted); font-size: 13px; margin-bottom: 20px; min-height: 20px;
        text-align: center; padding: 0 16px;
        animation: hl-msgFade 0.4s ease both;
      }

      /* ── Three bouncing dots ── */
      .hl-dots { display: flex; gap: 6px; margin-bottom: 20px; }
      .hl-dot {
        width: 7px; height: 7px; border-radius: 50%;
        animation: hl-dotBounce 1.2s ease-in-out infinite;
      }
      .hl-dot-1 { background: #3b82f6; animation-delay: 0s; }
      .hl-dot-2 { background: #f97316; animation-delay: 0.18s; }
      .hl-dot-3 { background: #8b5cf6; animation-delay: 0.36s; }

      /* ── Progress shimmer bar ── */
      .hl-bar-wrap {
        width: 200px; max-width: 70vw; height: 3px;
        background: var(--hl-bar-bg); border-radius: 99px; overflow: hidden;
      }
      .hl-bar {
        height: 100%; border-radius: 99px;
        background: linear-gradient(90deg,#3b82f6,#8b5cf6,#f97316,#3b82f6);
        background-size: 300% 100%;
        animation: hl-barShimmer 2s linear infinite;
      }

      /* ── Rescue ── */
      #html-loader-rescue {
        display: none; flex-direction: column; align-items: center;
        gap: 12px; margin-top: 16px; text-align: center; max-width: 300px;
      }
      #html-loader-rescue p { font-size: 13px; color: #ef4444; margin: 0; }
      #html-loader-reload {
        padding: 10px 24px; background: #0e7490; color: #fff;
        border: none; border-radius: 6px; font-size: 14px;
        font-weight: 600; cursor: pointer;
      }

      /* ── Footer ── */
      .hl-footer {
        position: absolute; bottom: 20px; left: 0; right: 0;
        display: flex; flex-direction: column; align-items: center; gap: 4px;
        animation: hl-fadeUp 0.8s ease both 0.3s;
      }
      .hl-footer p { font-size: 10px; color: var(--hl-text-muted); margin: 0; text-align: center; padding: 0 16px; }
      .hl-footer-trinity {
        font-weight: 700;
        background: linear-gradient(90deg,#60a5fa,#a78bfa,#fb923c);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      #initial-loader, [data-legacy-loader="true"] {
        display: none !important; visibility: hidden !important;
        opacity: 0 !important; position: fixed !important; z-index: -9999 !important;
      }

      /* ── Keyframes ── */
      @keyframes hl-orbit    { to { transform: rotate(360deg); } }
      @keyframes hl-ringPulse { 0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.9;transform:scale(1.05)} }
      @keyframes hl-pulseBlue   { 0%,100%{opacity:1;filter:drop-shadow(0 0 6px #3b82f6)}50%{opacity:.7;filter:drop-shadow(0 0 14px #93c5fd)} }
      @keyframes hl-pulseOrange { 0%,100%{opacity:1;filter:drop-shadow(0 0 6px #f97316)}50%{opacity:.7;filter:drop-shadow(0 0 14px #fdba74)} }
      @keyframes hl-pulsePurple { 0%,100%{opacity:1;filter:drop-shadow(0 0 6px #8b5cf6)}50%{opacity:.7;filter:drop-shadow(0 0 14px #c4b5fd)} }
      @keyframes hl-orbGlow  { 0%,100%{opacity:1;filter:drop-shadow(0 0 4px #fff)}50%{opacity:.85;filter:drop-shadow(0 0 10px #e2e8f0)} }
      @keyframes hl-fadeUp   { from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)} }
      @keyframes hl-msgFade  { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)} }
      @keyframes hl-dotBounce { 0%,80%,100%{transform:translateY(0)scale(1);opacity:.8}40%{transform:translateY(-8px)scale(1.2);opacity:1} }
      @keyframes hl-barShimmer { 0%{background-position:100% 50%}100%{background-position:-200% 50%} }
      @keyframes hl-letterSlideLeft  { 0%,100%{transform:translateX(0)}30%{transform:translateX(-6px)rotate(-8deg)}60%{transform:translateX(2px)rotate(3deg)} }

    <script>
      // Swallow Vite HMR WebSocket localhost:undefined rejection in dev previews
      window.addEventListener('unhandledrejection', function(e) {
        var msg = String(e.reason && e.reason.message || e.reason || '');
        if (msg.indexOf('localhost:undefined') !== -1) e.preventDefault();
      }, true);

      // ── HTML Loader dismiss logic ──────────────────────────────────────────
      // Module scripts execute BEFORE DOMContentLoaded in modern browsers,
      // so React may already be mounted before any DOMContentLoaded handler runs.
      // We use polling every 50ms as the most reliable cross-browser approach.
      //
      // MIN_DISPLAY_MS enforces a 3000 ms floor so the brand moment is always
      // perceived as deliberate. Without this floor, React mounts in 200-600 ms
      // on a warm cache and the loader flickers past before the user sees it.
      // If React mounts before the floor expires, we defer dismissal until the
      // floor elapses.
      (function() {
        var MIN_DISPLAY_MS = 3000;
        var startedAt = Date.now();
        var dismissed = false;
        var pollInterval = null;
        var rescueTimer = null;
        var pendingDismiss = false;

        function hideLoader() {
          if (dismissed) return;
          dismissed = true;
          if (pollInterval) clearInterval(pollInterval);
          if (rescueTimer) clearTimeout(rescueTimer);
          var el = document.getElementById('html-loader');
          if (!el) return;
          el.classList.add('fade-out');
          setTimeout(function() { el.classList.add('gone'); }, 350);
        }

        function requestDismiss() {
          if (dismissed || pendingDismiss) return;
          var elapsed = Date.now() - startedAt;
          if (elapsed >= MIN_DISPLAY_MS) {
            hideLoader();
          } else {
            pendingDismiss = true;
            setTimeout(hideLoader, MIN_DISPLAY_MS - elapsed);
          }
        }

        function checkRoot() {
          var root = document.getElementById('root');
          if (root && root.childElementCount > 0) requestDismiss();
        }

        // Poll every 50ms — catches React mount regardless of script execution order
        pollInterval = setInterval(checkRoot, 50);

        // Also listen for explicit React signal (belt-and-suspenders)
        window.addEventListener('coaileague:mounted', requestDismiss);

        // Rescue: after 25 s still not mounted, show the Reload button
        rescueTimer = setTimeout(function() {
          if (dismissed) return;
          if (pollInterval) clearInterval(pollInterval);
          var rescue = document.getElementById('html-loader-rescue');
          if (rescue) rescue.style.display = 'flex';
        }, 25000);
      })();
    </script>
