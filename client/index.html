<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AutoForce™" />
    <title>AutoForce™ - Autonomous Workforce Management Solutions</title>
    <meta name="description" content="Autonomous workforce management platform for emergency services with intelligent automation, real-time tracking, and compliance tools. Streamline operations with BillOS™, PayrollOS™, CommOS™, and more." />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AutoForce™ - Autonomous Workforce Management Solutions" />
    <meta property="og:description" content="Streamline emergency services operations with autonomous workforce management, intelligent automation, and real-time tracking" />
    <meta property="og:image" content="/og-image.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Theme Color - Emergency Green -->
    <meta name="theme-color" content="#10b981" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" content="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/print-styles.css" media="print">
    <style>
      /* Initial loading screen - shows BEFORE React loads */
      #initial-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-center: center;
        background: hsl(222.2 84% 4.9%);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      }
      
      #initial-loader.loaded {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease-out;
      }
      
      .loader-content {
        width: 90vw;
        max-width: 400px;
        padding: 0 24px;
      }
      
      .loader-title {
        text-align: center;
        margin-bottom: 32px;
      }
      
      .loader-title h1 {
        font-size: clamp(24px, 5vw, 32px);
        font-weight: 700;
        color: hsl(210 40% 98%);
        margin: 0 0 8px 0;
      }
      
      .loader-title p {
        font-size: 14px;
        color: hsl(215 20.2% 65.1%);
        margin: 0;
      }
      
      .loader-bar {
        height: 12px;
        background: hsl(217.2 32.6% 17.5%);
        border-radius: 999px;
        overflow: hidden;
        margin-bottom: 12px;
        border: 1px solid hsl(217.2 32.6% 20%);
      }
      
      .loader-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, hsl(142 76% 36%), hsl(142 76% 56%), hsl(142 76% 36%));
        background-size: 200% 100%;
        animation: loading-shimmer 1.5s linear infinite;
        width: 0%;
        transition: width 0.3s ease-out;
      }
      
      @keyframes loading-shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      
      .loader-message {
        text-align: center;
        min-height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }
      
      .loader-message p {
        font-size: 14px;
        font-weight: 500;
        color: hsl(142 76% 36%);
        margin: 0;
        animation: text-bounce 1.5s ease-in-out infinite;
      }
      
      @keyframes text-bounce {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-3px); }
      }
      
      .bouncing-dots {
        display: inline-flex;
        gap: 2px;
      }
      
      .bouncing-dots span {
        width: 6px;
        height: 6px;
        background: hsl(142 76% 36%);
        border-radius: 50%;
        display: inline-block;
        animation: dot-bounce 1.4s ease-in-out infinite;
      }
      
      .bouncing-dots span:nth-child(1) {
        animation-delay: 0s;
      }
      
      .bouncing-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      
      .bouncing-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }
      
      @keyframes dot-bounce {
        0%, 60%, 100% {
          transform: translateY(0);
          opacity: 1;
        }
        30% {
          transform: translateY(-8px);
          opacity: 0.7;
        }
      }
    </style>
  </head>
  <body>
    <!-- Static HTML loader - appears INSTANTLY before React -->
    <div id="initial-loader">
      <div class="loader-content">
        <div class="loader-title">
          <h1>AutoForce™</h1>
          <p>Authenticating</p>
        </div>
        <div class="loader-bar">
          <div class="loader-bar-fill" id="loader-bar-fill"></div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px; padding: 0 4px;">
          <span id="loader-percentage" style="font-size: 12px; font-weight: 600; color: hsl(142 76% 36%); font-family: 'JetBrains Mono', monospace;">0%</span>
          <span style="font-size: 11px; color: hsl(215 20.2% 65.1%); font-family: 'JetBrains Mono', monospace;">Loading...</span>
        </div>
        <div class="loader-message">
          <p id="loader-text">Initializing workspace</p>
          <div class="bouncing-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Animate loader with random techy messages -->
    <script>
      (function() {
        var messages = [
          "Initializing workspace...",
          "Connecting to AutoForce™...",
          "Establishing secure connection...",
          "Loading modules...",
          "Authenticating session...",
          "Verifying credentials...",
          "Syncing data...",
          "Configuring environment...",
          "Preparing dashboard...",
          "Optimizing performance...",
          "Building interface...",
          "Loading components...",
          "Almost there...",
          "Finalizing..."
        ];
        
        var progressSteps = [
          { progress: 10, duration: 500 },
          { progress: 30, duration: 600 },
          { progress: 55, duration: 700 },
          { progress: 70, duration: 650 },
          { progress: 87, duration: 600 },
          { progress: 95, duration: 700 },
          { progress: 99, duration: 800 }
        ];
        
        var currentStep = 0;
        var currentMessage = 0;
        var barFill = document.getElementById('loader-bar-fill');
        var percentageText = document.getElementById('loader-percentage');
        var messageText = document.getElementById('loader-text');
        
        function updateLoader() {
          if (currentStep < progressSteps.length) {
            var step = progressSteps[currentStep];
            barFill.style.width = step.progress + '%';
            percentageText.textContent = step.progress + '%';
            
            // Rotate through messages
            messageText.textContent = messages[currentMessage];
            currentMessage = (currentMessage + 1) % messages.length;
            
            currentStep++;
            setTimeout(updateLoader, step.duration);
          }
        }
        
        // Start animation immediately
        setTimeout(updateLoader, 100);
        
        // Hide loader once React loads
        window.addEventListener('load', function() {
          setTimeout(function() {
            barFill.style.width = '100%';
            percentageText.textContent = '100%';
            messageText.textContent = 'Complete!';
            
            setTimeout(function() {
              var loader = document.getElementById('initial-loader');
              if (loader) {
                loader.classList.add('loaded');
                setTimeout(function() {
                  loader.remove();
                }, 300);
              }
            }, 200);
          }, 100);
        });
      })();
    </script>
  </body>
</html>
