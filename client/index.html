  <body>
    <style>
      /* Target ONLY legacy loader overlay - do NOT use wildcards that hide React components */
      #initial-loader,
      [data-legacy-loader="true"] { 
        display: none !important; 
        visibility: hidden !important; 
        opacity: 0 !important; 
        position: fixed !important; 
        z-index: -9999 !important; 
      }
    </style>
    <div id="root"></div>
    <script>
      console.log('[DEBUG] HTML script block executing - JS is working');
      
      // Suppress Vite HMR WebSocket errors BEFORE any modules load (development-only)
      
      // Patch WebSocket constructor to prevent "localhost:undefined" errors
      const OriginalWebSocket = globalThis.WebSocket;
      globalThis.WebSocket = function(url, ...args) {
        if (typeof url === 'string' && (url.includes('localhost:undefined') || url.includes('localhost:null'))) {
          // Return a mock WebSocket that silently fails
          const mockWs = {
            readyState: 3,
            close: () => {},
            send: () => {},
            addEventListener: () => {},
            removeEventListener: () => {},
            dispatchEvent: () => true
          };
          return mockWs;
        }
        return new OriginalWebSocket(url, ...args);
      };
      Object.setPrototypeOf(globalThis.WebSocket, OriginalWebSocket);
      
      // Catch any unhandledrejections from Vite HMR
      window.addEventListener('unhandledrejection', function(event) {
        const reason = event.reason;
        if (!reason) return;
        const reasonStr = String(reason);
        const messageStr = reason?.message ? String(reason.message) : "";
        
        if (reasonStr.includes("Failed to construct 'WebSocket'") || 
            reasonStr.includes("localhost:undefined") ||
            messageStr.includes("Failed to construct 'WebSocket'") ||
            messageStr.includes("localhost:undefined")) {
          event.preventDefault();
        }
      }, true); // Use capture phase to catch before any other handlers

      // Ensure only legacy loader overlays are hidden (do NOT hide React components)
      window.addEventListener('DOMContentLoaded', function() {
        var legacyLoader = document.getElementById('initial-loader');
        if (legacyLoader) {
          legacyLoader.style.display = 'none';
          legacyLoader.style.visibility = 'hidden';
        }
        document.querySelectorAll('[data-legacy-loader="true"]').forEach(function(el) {
          el.style.display = 'none';
          el.style.visibility = 'hidden';
        });
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
