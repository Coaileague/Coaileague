<svg viewBox="0 0 120 120" width="120" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="c" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="40%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity=".5"/>
    </radialGradient>
    <filter id="ga" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gc" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- orbital ring CW -->
  <g><animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="8s" repeatCount="indefinite"/>
    <circle cx="60" cy="60" r="53" fill="none" stroke="#93C5FD" stroke-width="1.2" stroke-dasharray="7 22 2 22" opacity=".3"/>
  </g>
  <!-- orbital ring CCW -->
  <g><animateTransform attributeName="transform" type="rotate" from="360 60 60" to="0 60 60" dur="13s" repeatCount="indefinite"/>
    <circle cx="60" cy="60" r="45" fill="none" stroke="#FED7AA" stroke-width=".8" stroke-dasharray="4 16" opacity=".2"/>
  </g>
  <!-- arm blue -->
  <g filter="url(#ga)"><path d="M60 43 C55 34,53 19,60 6 C67 19,65 34,60 43 Z" fill="#93C5FD" opacity=".9">
    <animate attributeName="opacity" values=".6;1;.6" dur="4s" repeatCount="indefinite"/>
  </path><circle cx="60" cy="6" r="3" fill="#93C5FD"><animate attributeName="r" values="2;4;2" dur="4s" repeatCount="indefinite"/></circle></g>
  <!-- arm orange -->
  <g filter="url(#ga)" transform="rotate(120 60 60)"><path d="M60 43 C55 34,53 19,60 6 C67 19,65 34,60 43 Z" fill="#FED7AA" opacity=".9">
    <animate attributeName="opacity" values=".6;1;.6" dur="4s" begin=".5s" repeatCount="indefinite"/>
  </path><circle cx="60" cy="6" r="3" fill="#FED7AA"><animate attributeName="r" values="2;4;2" dur="4s" begin=".5s" repeatCount="indefinite"/></circle></g>
  <!-- arm purple -->
  <g filter="url(#ga)" transform="rotate(240 60 60)"><path d="M60 43 C55 34,53 19,60 6 C67 19,65 34,60 43 Z" fill="#C4B5FD" opacity=".9">
    <animate attributeName="opacity" values=".6;1;.6" dur="4s" begin="1s" repeatCount="indefinite"/>
  </path><circle cx="60" cy="6" r="3" fill="#C4B5FD"><animate attributeName="r" values="2;4;2" dur="4s" begin="1s" repeatCount="indefinite"/></circle></g>
  <!-- core -->
  <circle cx="60" cy="60" r="16" fill="url(#c)" filter="url(#gc)" opacity=".85">
    <animate attributeName="r" values="13;19;13" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="60" r="7" fill="#fff" opacity=".92"/>
  <circle cx="57" cy="57" r="2.5" fill="#fff" opacity=".8"/>
</svg>