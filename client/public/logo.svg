<svg viewBox="0 0 100 100" width="100" height="100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#93C5FD" stop-opacity=".95"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity=".15"/>
    </linearGradient>
    <linearGradient id="g2" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FED7AA" stop-opacity=".95"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity=".15"/>
    </linearGradient>
    <linearGradient id="g3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity=".95"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity=".15"/>
    </linearGradient>
    <radialGradient id="gc" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity=".5"/>
    </radialGradient>
    <filter id="gf" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer orbital ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#60A5FA" stroke-width=".8" stroke-dasharray="6 18 2 18" opacity=".3">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="8s" repeatCount="indefinite"/>
  </circle>
  <!-- Inner counter ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#A78BFA" stroke-width=".6" stroke-dasharray="4 14" opacity=".2">
    <animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="12s" repeatCount="indefinite"/>
  </circle>
  <!-- Arm 1 Blue -->
  <g filter="url(#gf)">
    <path d="M50 36 C46 28,44 16,50 5 C56 16,54 28,50 36 Z" fill="url(#g1)" opacity=".95">
      <animate attributeName="opacity" values=".7;1;.7" dur="4s" repeatCount="indefinite"/>
    </path>
    <circle cx="50" cy="5" r="2.8" fill="#93C5FD">
      <animate attributeName="r" values="2;3.5;2" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Arm 2 Orange -->
  <g filter="url(#gf)" transform="rotate(120 50 50)">
    <path d="M50 36 C46 28,44 16,50 5 C56 16,54 28,50 36 Z" fill="url(#g2)" opacity=".95">
      <animate attributeName="opacity" values=".7;1;.7" dur="4s" begin="1.3s" repeatCount="indefinite"/>
    </path>
    <circle cx="50" cy="5" r="2.8" fill="#FED7AA">
      <animate attributeName="r" values="2;3.5;2" dur="4s" begin="1.3s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Arm 3 Purple -->
  <g filter="url(#gf)" transform="rotate(240 50 50)">
    <path d="M50 36 C46 28,44 16,50 5 C56 16,54 28,50 36 Z" fill="url(#g3)" opacity=".95">
      <animate attributeName="opacity" values=".7;1;.7" dur="4s" begin="2.6s" repeatCount="indefinite"/>
    </path>
    <circle cx="50" cy="5" r="2.8" fill="#C4B5FD">
      <animate attributeName="r" values="2;3.5;2" dur="4s" begin="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Core -->
  <circle cx="50" cy="50" r="14" fill="url(#gc)" opacity=".85">
    <animate attributeName="r" values="12;15;12" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="50" r="6" fill="#ffffff" opacity=".9"/>
  <circle cx="47" cy="47" r="2" fill="#ffffff" opacity=".8"/>
</svg>