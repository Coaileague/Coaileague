<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyanGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#22d3ee;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:0.5" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- CoAIleague Triquetra - Three interlocking circles -->

  <!-- Circle 1 - Top (Teal) -->
  <circle
    cx="50" cy="32" r="26"
    fill="url(#tealGradient)"
    opacity="0.75"
    filter="url(#glow)"
  />

  <!-- Circle 2 - Bottom Left (Cyan) -->
  <circle
    cx="32" cy="62" r="26"
    fill="url(#cyanGradient)"
    opacity="0.75"
    filter="url(#glow)"
  />

  <!-- Circle 3 - Bottom Right (Blue) -->
  <circle
    cx="68" cy="62" r="26"
    fill="url(#blueGradient)"
    opacity="0.75"
    filter="url(#glow)"
  />
  
  <!-- Central nexus point -->
  <circle cx="50" cy="50" r="10" fill="url(#coreGlow)" filter="url(#glow)"/>
  <circle cx="50" cy="50" r="5" fill="#ffffff" opacity="0.95"/>
</svg>
