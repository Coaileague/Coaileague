<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoAIleague Ad — Outcome</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  .ad {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
    background: #0D1B2A;
    display: flex;
    flex-direction: column;
  }
  .hero-image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    filter: brightness(0.25) saturate(0.6);
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: #0D1B2A;
    opacity: 0.55;
  }
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 100%;
    padding: 6vw;
  }
  .top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo-pill {
    display: flex;
    align-items: center;
    gap: 2vw;
    background: rgba(212, 175, 55, 0.15);
    border: 0.3vw solid #D4AF37;
    padding: 1.5vw 3vw;
  }
  .logo-mark {
    width: 5vw;
    height: 5vw;
    background: #D4AF37;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3vw;
    font-weight: 900;
    color: #0D1B2A;
    flex-shrink: 0;
  }
  .logo-name {
    color: #FFFFFF;
    font-size: 3.2vw;
    font-weight: 800;
    letter-spacing: 0.02em;
  }
  .tag {
    background: #D4AF37;
    color: #0D1B2A;
    font-size: 2.2vw;
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 1vw 2.5vw;
  }
  .center-content {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4vw;
  }
  .kicker {
    color: #D4AF37;
    font-size: 2.5vw;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }
  .headline {
    color: #FFFFFF;
    font-size: 9vw;
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -0.03em;
    text-align: center;
  }
  .headline em {
    color: #D4AF37;
    font-style: normal;
  }
  .features {
    display: flex;
    gap: 4vw;
  }
  .feature {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1vw;
  }
  .feature-icon {
    width: 6vw;
    height: 6vw;
    background: #D4AF37;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .feature-icon svg {
    width: 3.5vw;
    height: 3.5vw;
    fill: #0D1B2A;
  }
  .feature-label {
    color: #A8BFCF;
    font-size: 2vw;
    font-weight: 600;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .bottom-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .website {
    color: #D4AF37;
    font-size: 2.5vw;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .cta-btn {
    background: #D4AF37;
    color: #0D1B2A;
    font-size: 3.2vw;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2.8vw 6vw;
    text-decoration: none;
    display: inline-block;
  }
</style>
</head>
<body>
<div class="ad">
  <img class="hero-image" src="/ads/images/ad_angle2_outcome.png" alt="AI command center">
  <div class="overlay"></div>
  <div class="content">
    <div class="top-row">
      <div class="logo-pill">
        <div class="logo-mark">C</div>
        <span class="logo-name">CoAIleague</span>
      </div>
      <div class="tag">Texas Launch</div>
    </div>
    <div class="center-content">
      <div class="kicker">Introducing</div>
      <div class="headline">One Platform.<br><em>Total Control.</em></div>
      <div class="features">
        <div class="feature">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
          </div>
          <span class="feature-label">Scheduling</span>
        </div>
        <div class="feature">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
          </div>
          <span class="feature-label">Payroll</span>
        </div>
        <div class="feature">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
          </div>
          <span class="feature-label">Compliance</span>
        </div>
        <div class="feature">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
          </div>
          <span class="feature-label">AI Brain</span>
        </div>
      </div>
    </div>
    <div class="bottom-row">
      <div class="website">www.coaileague.com</div>
      <a class="cta-btn" href="https://www.coaileague.com">See It In Action</a>
    </div>
  </div>
</div>
</body>
</html>
