<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoAIleague Ad — Pain Point</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #0D1B2A;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  .ad {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    background: #0D1B2A;
  }
  .photo-half {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .photo-half img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    filter: brightness(0.55) saturate(0.7);
  }
  .photo-overlay {
    position: absolute;
    inset: 0;
    background: #0D1B2A;
    opacity: 0.35;
  }
  .photo-badge {
    position: absolute;
    top: 4vw;
    right: 4vw;
    background: #D4AF37;
    color: #0D1B2A;
    font-size: 2.8vw;
    font-weight: 900;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 1.2vw 2.2vw;
  }
  .content {
    background: #0D1B2A;
    padding: 5vw 6vw 5vw 6vw;
    display: flex;
    flex-direction: column;
    gap: 3vw;
  }
  .eyebrow {
    color: #D4AF37;
    font-size: 2.4vw;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .headline {
    color: #FFFFFF;
    font-size: 7.5vw;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -0.02em;
  }
  .headline span {
    color: #D4AF37;
  }
  .subtext {
    color: #A8BFCF;
    font-size: 2.8vw;
    line-height: 1.5;
    max-width: 80%;
  }
  .bottom-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 3vw;
    margin-top: 1vw;
  }
  .cta-btn {
    background: #D4AF37;
    color: #0D1B2A;
    font-size: 3vw;
    font-weight: 900;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 2.5vw 5vw;
    text-decoration: none;
    display: inline-block;
    white-space: nowrap;
  }
  .logo-area {
    display: flex;
    align-items: center;
    gap: 1.5vw;
  }
  .logo-mark {
    width: 7vw;
    height: 7vw;
    background: #D4AF37;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4vw;
    font-weight: 900;
    color: #0D1B2A;
    flex-shrink: 0;
  }
  .logo-text {
    display: flex;
    flex-direction: column;
  }
  .logo-name {
    color: #FFFFFF;
    font-size: 3vw;
    font-weight: 800;
    letter-spacing: 0.03em;
    line-height: 1;
  }
  .logo-tagline {
    color: #D4AF37;
    font-size: 1.8vw;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .url-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #D4AF37;
    color: #0D1B2A;
    font-size: 2vw;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-align: center;
    padding: 1.2vw;
  }
</style>
</head>
<body>
<div class="ad">
  <div class="photo-half">
    <img src="/ads/images/ad_angle1_pain.png" alt="Security manager overwhelmed with paperwork">
    <div class="photo-overlay"></div>
    <div class="photo-badge">Texas Security</div>
  </div>
  <div class="content">
    <div class="eyebrow">Workforce Management</div>
    <div class="headline">Still Scheduling<br>by <span>Hand?</span></div>
    <div class="subtext">CoAIleague automates scheduling, payroll &amp; compliance — so you can focus on growing your business.</div>
    <div class="bottom-row">
      <div class="logo-area">
        <div class="logo-mark">C</div>
        <div class="logo-text">
          <span class="logo-name">CoAIleague</span>
          <span class="logo-tagline">AI-Powered Platform</span>
        </div>
      </div>
      <a class="cta-btn" href="https://www.coaileague.com">Get Free Demo</a>
    </div>
  </div>
  <div class="url-bar">www.coaileague.com</div>
</div>
</body>
</html>
