<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoAIleague Ad — Texas Identity</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  .ad {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
    background: #0D1B2A;
    display: flex;
    flex-direction: column;
  }
  .hero-image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    filter: brightness(0.35) saturate(0.8);
  }
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .top-bar {
    background: #D4AF37;
    padding: 2vw 5vw;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .top-bar-logo {
    display: flex;
    align-items: center;
    gap: 2vw;
  }
  .logo-mark {
    width: 6vw;
    height: 6vw;
    background: #0D1B2A;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.5vw;
    font-weight: 900;
    color: #D4AF37;
    flex-shrink: 0;
  }
  .logo-name {
    color: #0D1B2A;
    font-size: 3.5vw;
    font-weight: 900;
    letter-spacing: 0.02em;
  }
  .top-bar-tag {
    color: #0D1B2A;
    font-size: 2.2vw;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 5vw 6vw;
    gap: 4vw;
  }
  .state-label {
    display: flex;
    align-items: center;
    gap: 2vw;
  }
  .state-line {
    height: 0.5vw;
    width: 6vw;
    background: #D4AF37;
  }
  .state-text {
    color: #D4AF37;
    font-size: 2.8vw;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .headline {
    color: #FFFFFF;
    font-size: 8.5vw;
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -0.02em;
  }
  .headline em {
    color: #D4AF37;
    font-style: normal;
    display: block;
  }
  .proof-row {
    display: flex;
    gap: 4vw;
  }
  .proof-item {
    background: rgba(13, 27, 42, 0.85);
    border-left: 0.8vw solid #D4AF37;
    padding: 2vw 3vw;
    display: flex;
    flex-direction: column;
    gap: 0.5vw;
  }
  .proof-number {
    color: #D4AF37;
    font-size: 5vw;
    font-weight: 900;
    line-height: 1;
  }
  .proof-label {
    color: #A8BFCF;
    font-size: 1.8vw;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .cta-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .website {
    color: #FFFFFF;
    font-size: 2.5vw;
    font-weight: 600;
    letter-spacing: 0.05em;
    opacity: 0.8;
  }
  .cta-btn {
    background: #D4AF37;
    color: #0D1B2A;
    font-size: 3.2vw;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3vw 6vw;
    text-decoration: none;
    display: inline-block;
  }
</style>
</head>
<body>
<div class="ad">
  <img class="hero-image" src="/ads/images/ad_angle3_texas.png" alt="Texas security officers">
  <div class="content">
    <div class="top-bar">
      <div class="top-bar-logo">
        <div class="logo-mark">C</div>
        <span class="logo-name">CoAIleague</span>
      </div>
      <span class="top-bar-tag">AI Workforce Platform</span>
    </div>
    <div class="main-content">
      <div class="state-label">
        <div class="state-line"></div>
        <span class="state-text">Now Available in Texas</span>
      </div>
      <div class="headline">Built for<br><em>Texas Security<br>Companies.</em></div>
      <div class="proof-row">
        <div class="proof-item">
          <span class="proof-number">100%</span>
          <span class="proof-label">Automated Scheduling</span>
        </div>
        <div class="proof-item">
          <span class="proof-number">ZERO</span>
          <span class="proof-label">Compliance Gaps</span>
        </div>
        <div class="proof-item">
          <span class="proof-number">24/7</span>
          <span class="proof-label">AI Operations Brain</span>
        </div>
      </div>
      <div class="cta-row">
        <span class="website">www.coaileague.com</span>
        <a class="cta-btn" href="https://www.coaileague.com">Join the Future</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
